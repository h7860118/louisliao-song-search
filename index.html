<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>路易斯曲目表查詢</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #f5f7fb;
      color: #1f2933;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ------------------ 標題列 ------------------ */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0;
      color: #0f172a;
    }

    /* ------------------ 官網膠囊 ------------------ */
    .brand-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px 11px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4f7ff 0%, #e4ecff 100%);
      border: 1px solid rgba(148,163,184,0.30);
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(37,99,235,0.14);
      transition: all .2s ease;
      overflow: visible;
      position: relative;
    }

    .brand-pill::before {
      content: "";
      position: absolute;
      inset: -10px -20px;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(164,191,255,0.40), rgba(164,191,255,0));
      filter: blur(8px);
      z-index: -1;
      opacity: 0.85;
      pointer-events: none;
    }

    .brand-pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(37,99,235,0.22);
      filter: brightness(1.03);
    }

    .brand-pill-logo {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #ffffff;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(37,99,235,.30);
    }

    .brand-pill-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 640px) {
      .page { padding-top: 20px; }
      .header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
      h1 { font-size: 24px; }
      .brand-pill { padding: 9px 18px; font-size: 14px; }
      .brand-pill-logo { width: 24px; height: 24px; }
    }

    /* ------------------ 搜尋 UI ------------------ */
    .subtitle {
      font-size: 15px;
      color: #6b7280;
      margin-top: 8px;
      margin-bottom: 22px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 16px;
      position: relative;
    }
    
    .search-input-wrap {
      flex: 1;
      position: relative;
    }
    
    .search-input-wrap input {
      width: 100%;
      padding: 14px 76px 14px 20px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(15,23,42,0.02);
    }
    
    .search-input-wrap input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .search-controls {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .clear-btn {
      background: #e2e8f0;
      color: #475569;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: background 0.15s ease;
    }
    
    .clear-btn:hover {
      background: #cbd5e1;
      color: #0f172a;
    }

    .search-icon-svg {
      width: 18px;
      height: 18px;
      fill: #94a3b8;
      pointer-events: none;
    }

    .search-btn {
      padding: 0 32px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    
    .search-btn:hover {
      background: #1d4ed8;
    }

    @media (max-width: 640px) {
      .search-row { flex-direction: column; gap: 10px; }
      .search-btn { padding: 14px 0; text-align: center; width: 100%; }
    }

    .tip {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 18px;
    }

    .status {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
    }

    .skeleton-loader {
      display: none;
      flex-direction: column;
      gap: 14px;
      margin-top: 16px;
    }
    
    .skeleton-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid #e5e7eb;
    }
    
    .skeleton-line {
      height: 16px;
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: skeleton-blink 1.5s infinite linear;
      border-radius: 4px;
    }
    
    .skeleton-title { width: 45%; margin-bottom: 12px; }
    .skeleton-btn { width: 20%; }

    @keyframes skeleton-blink {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .results {
      margin-top: 8px;
    }

    .result-count {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 12px;
    }

    /* ------------------ 歌曲卡片與標籤 ------------------ */
    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 12px rgba(15,23,42,0.03);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(15,23,42,0.08);
    }

    .song-title-wrap {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .song-title {
      font-size: 17px;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.4;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-listening { background-color: #f0fdfa; color: #0d9488; border: 1px solid #ccfbf1; } /* 聽編樂譜專屬：蒂芬妮綠 */
    .badge-accompaniment { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-trio { background-color: #faf5ff; color: #6b21a8; border: 1px solid #e9d5ff; }
    .badge-violin { background-color: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
    .badge-piano-solo { background-color: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8; }
    .badge-piano-play { background-color: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .badge-solo { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .link-preview { background-color: #f1f5f9; color: #475569; }
    .link-preview:hover { background-color: #e2e8f0; color: #1e293b; }

    .link-demo { background-color: #fef2f2; color: #dc2626; }
    .link-demo:hover { background-color: #fee2e2; color: #991b1b; }

    .empty-state-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      color: #475569;
      margin-top: 16px;
    }

    .empty-state-box p { margin: 0 0 10px 0; font-size: 15px; }
    .empty-tip-text { font-size: 13px; color: #dc2626; margin: 0 0 16px 0; font-weight: 500; }

    .empty-contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: #06C755;
      color: #ffffff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(6,199,85,0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .empty-contact-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(6,199,85,0.3);
    }

    /* ------------------ LINE 浮動按鈕 ------------------ */
    #lineFab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      z-index: 850;
      cursor: pointer;
      text-decoration: none;
    }

    .line-fab-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: #06C755;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    #lineFab:hover .line-fab-inner { transform: translateY(-1px); box-shadow: 0 13px 28px rgba(0,0,0,.32); }
    #lineFab svg { width: 34px; height: 34px; display: block; }

    .line-modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: flex-end;
      align-items: center;
      background: rgba(0,0,0,.25);
      z-index: 840;
    }

    .line-modal {
      width: 320px;
      max-width: 90vw;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      margin-right: 22px;
    }

    .line-modal-header {
      background: #06C755;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 600;
    }

    .line-modal-header-left { display: flex; align-items: center; gap: 8px; }
    .line-modal-logo-circle { width: 22px; height: 22px; border-radius: 50%; background: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #06C755; font-weight: 700; }
    .line-modal-close { border: none; background: transparent; color: #ffffff; font-size: 20px; line-height: 1; cursor: pointer; padding: 0 4px; }
    .line-modal-body { padding: 16px 18px 20px; text-align: center; }
    .line-modal-qr { width: 210px; height: 210px; object-fit: contain; display: block; margin: 0 auto 14px; }
    .line-modal-link { display: inline-block; font-size: 14px; color: #2563eb; text-decoration: none; word-break: break-all; }
    .line-modal-link:hover { text-decoration: underline; }

    @media (max-width: 640px) { .line-modal { margin-right: 12px; } }
  </style>
</head>

<body>

  <div class="page">
    <div class="header-row">
      <h1>路易斯曲目表查詢</h1>
      <a class="brand-pill" href="https://louisliaopiano.com" target="_blank" rel="noopener">
        <span class="brand-pill-logo">
          <img src="https://cdn.store-assets.com/s/715447/f/15885666.jpg" alt="LouisLiao Piano Logo" />
        </span>
        <span>LouisLiao Piano 鋼琴編曲</span>
      </a>
    </div>

    <div class="subtitle">
      輸入歌名或演唱者的一部分即可模糊搜尋，例如「天天想你」「回到過去」等。
    </div>

    <div class="search-row">
      <div class="search-input-wrap">
        <input id="keyword" type="text" placeholder="輸入歌名／演唱者關鍵字…" autocomplete="off" />
        <div class="search-controls">
          <button id="clearBtn" class="clear-btn" title="清空文字" type="button">×</button>
          <svg class="search-icon-svg" viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </div>
      </div>
      <button id="searchBtn" class="search-btn">搜尋</button>
    </div>

    <div class="tip">
      🔍 小秘訣：支援多關鍵字搜尋！輸入「周杰倫 回到過去」或空格拆開也能精準找到喔！
    </div>

    <div id="status" class="status">目前載入中…</div>
    
    <div id="skeletonLoader" class="skeleton-loader">
      <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line skeleton-btn"></div></div>
      <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line skeleton-btn"></div></div>
    </div>
    
    <div id="results" class="results"></div>
  </div>

  <a id="lineFab" aria-label="加入 LINE 官方帳號">
    <div class="line-fab-inner">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M32 12C21 12 12 19.5 12 29c0 7.2 5.4 13.2 13.5 14.7L26 52l7.2-5.4C44 45.9 52 38.2 52 29 52 19.5 43 12 32 12z" fill="#ffffff" />
        <text x="32" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#06c755" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif">LINE</text>
      </svg>
    </div>
  </a>

  <div id="lineModalOverlay" class="line-modal-overlay" aria-hidden="true">
    <div class="line-modal" role="dialog" aria-modal="true" aria-labelledby="lineModalTitle">
      <div class="line-modal-header">
        <div class="line-modal-header-left">
          <div class="line-modal-logo-circle">LINE</div>
          <div id="lineModalTitle">路易斯 LINE 客服</div>
        </div>
        <button type="button" class="line-modal-close" aria-label="關閉">×</button>
      </div>
      <div class="line-modal-body">
        <img class="line-modal-qr" src="https://raw.githubusercontent.com/h7860118/lyrics-space/main/line_oa_chat_210222_223854.jpg" alt="加入 LINE 好友 QR Code" />
        <a class="line-modal-link" href="https://lin.ee/aAgocM5" target="_blank" rel="noopener">https://lin.ee/aAgocM5</a>
      </div>
    </div>
  </div>

  <script>
    const lineFab         = document.getElementById("lineFab");
    const lineOverlay     = document.getElementById("lineModalOverlay");
    const lineCloseButton = document.querySelector(".line-modal-close");

    function openLineModal() {
      if (!lineOverlay) {
        window.open("https://lin.ee/aAgocM5", "_blank");
        return;
      }
      lineOverlay.style.display = "flex";
      lineOverlay.setAttribute("aria-hidden", "false");
    }

    function closeLineModal() {
      if (!lineOverlay) return;
      lineOverlay.style.display = "none";
      lineOverlay.setAttribute("aria-hidden", "true");
    }

    if (lineFab) {
      lineFab.addEventListener("click", (e) => {
        e.preventDefault();
        openLineModal();
      });
    }

    if (lineCloseButton) {
      lineCloseButton.addEventListener("click", closeLineModal);
    }

    if (lineOverlay) {
      lineOverlay.addEventListener("click", (e) => {
        if (e.target === lineOverlay) {
          closeLineModal();
        }
      });
    }
  </script>

  <script>
    // 欄位容錯解析引擎，支援標準 CSV 及 Google Visualization JSON 回傳流格式
    function parseCSVLine(text) {
      const p = [];
      let row = [''];
      let q = false;
      let r = 0;
      for (let n = 0; n < text.length; n++) {
        let c = text.charAt(n);
        if (c === '"') { 
          q = !q; 
        } else if (c === ',' && !q) { 
          c = row[++r] = ''; 
        } else if ((c === '\n' || c === '\r') && !q) {
          if (c === '\r' && text.charAt(n+1) === '\n') { n++; }
          p.push(row.map(v => v.trim()));
          row = [''];
          r = 0;
        } else { 
          if (!row[r]) row[r] = '';
          row[r] += c; 
        }
      }
      if (row.length > 1 || row[0] !== '') {
        p.push(row.map(v => v.trim()));
      }
      return p;
    }

    // 將新提供的測試「聽編樂譜」表格整合進去，改用標準無障礙 JSON 擷取流結構
    const CSV_URLS = [
      { url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOihjh1ceJIGyQQ49iBMcJoNS8Xqq_NW7nQVQ8gSQ89Hgo2yk4CA2fUNJjIEEdzqkcz2_2WfKlCQtV/pub?output=csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1y36HFW7QEapeMKmvs32koMlPEdf_EyDXBfcVB64KmK8/gviz/tq?tqx=out:csv&gid=1903698059", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1LhsbC3C4xVo8jfKfjivglOdou-ouRP38yGyemB9VqcI/gviz/tq?tqx=out:csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/18dzIqwQ9MC-8slit9_FvUSc1bnIOIJIHDi08bKOAZqQ/gviz/tq?tqx=out:csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1zKycWqb3247YkPlRcPgGY-ZvDhbYwsLKBjKTQiqooO8/gviz/tq?tqx=out:csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1-iliNJJM26LLijsTy2hh5dje19MJ_4WqOZeg5UKKQLU/gviz/tq?tqx=out:csv", type: "standard" },
      // 聽編樂譜專屬對接點：使用全新測試表格代號，並強制採取 JSON/gviz 雙層安全加密解析流
      { url: "https://docs.google.com/spreadsheets/d/1ExCq_bu_WLGEi69XxtIK9iDMWpoQjyl9EdxzTPYLIwA/gviz/tq", type: "listening" }
    ];

    let songs = [];
    let debounceTimer;

    const statusEl   = document.getElementById("status");
    const resultsEl  = document.getElementById("results");
    const searchEl   = document.getElementById("keyword");
    const clearBtnEl = document.getElementById("clearBtn");
    const skeletonEl = document.getElementById("skeletonLoader");

    async function loadAllCSVs() {
      statusEl.textContent = "正在載入多張曲目資料…";
      songs = [];
      let successCount = 0;

      for (const item of CSV_URLS) {
        try {
          const res = await fetch(item.url);
          if (!res.ok) continue;
          let text = await res.text();
          
          // 進階解鎖：若檔案含有 Google JSON 安全保護殼頭尾，自動剝除並使用高精準物件解析法
          if (text.includes("google.visualization.Query.setResponse")) {
            const rawJson = text.replace(/[\s\S]*?google\.visualization\.Query\.setResponse\(/, "").replace(/\);?\s*$/, "");
            const dataObj = JSON.parse(rawJson);
            if (dataObj.table && dataObj.table.rows) {
              const parsedSheetSongs = dataObj.table.rows.map(row => {
                const cleanTitle = row.c[0]?.v !== null ? String(row.c[0]?.v || '') : '';
                const cleanProd  = row.c[1]?.v !== null ? String(row.c[1]?.v || '') : '';
                const cleanYt    = row.c[2]?.v !== null ? String(row.c[2]?.v || '') : '';
                return { title: cleanTitle, productUrl: cleanProd, youtubeUrl: cleanYt, sourceType: item.type };
              }).filter(s => s.title && s.title !== "歌名" && s.title !== "曲目");
              
              songs = songs.concat(parsedSheetSongs);
              successCount++;
              continue;
            }
          }

          // 標準文字格式容錯解析法
          const parsedRows = parseCSVLine(text).slice(1);
          const currentSheetSongs = parsedRows
            .map(c => ({
              title:      c[0]?.replace(/^"|"$/g, '') || '',
              productUrl: c[1]?.replace(/^"|"$/g, '') || '',
              youtubeUrl: c[2]?.replace(/^"|"$/g, '') || '',
              sourceType: item.type
            }))
            .filter(s => s.title && s.title !== "歌名" && s.title !== "曲目");

          songs = songs.concat(currentSheetSongs);
          successCount++;
        } catch (e) {
          console.error("載入曲目表失敗，網址: " + item.url, e);
        }
      }

      if (successCount > 0) {
        statusEl.textContent = `資料載入完成，共成功讀取 ${successCount} 張曲目來源，目前共有 ${songs.length} 首歌曲提供搜尋！`;
      } else {
        statusEl.textContent = "所有曲目表讀取失敗，請確認網路連線。";
      }
    }

    function toggleClearButton() {
      clearBtnEl.style.display = searchEl.value.trim().length > 0 ? "inline-flex" : "none";
    }

    function handleSearchInput() {
      toggleClearButton();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { doSearch(true); }, 250);
    }

    function doSearch(isInstant = false) {
      const rawQuery = searchEl.value.trim();
      toggleClearButton();
      
      if (!rawQuery) {
        statusEl.textContent = "";
        resultsEl.innerHTML = "";
        return;
      }

      const queryTerms = rawQuery.toLowerCase().split(/\s+/).filter(t => t.length > 0);
      const list = songs.filter(s => {
        const titleLower = s.title.toLowerCase();
        return queryTerms.every(term => titleLower.includes(term));
      });

      if (isInstant) {
        render(list, rawQuery);
      } else {
        statusEl.textContent = "";
        resultsEl.innerHTML = "";
        skeletonEl.style.display = "flex";
        setTimeout(() => {
          skeletonEl.style.display = "none";
          render(list, rawQuery);
        }, 200);
      }
    }

    function render(list, kw) {
      if (!list.length) {
        statusEl.textContent = "";
        let hintHtml = "";
        if (kw.length > 4) {
          hintHtml = `<p class="empty-tip-text">💡 貼心小提示：試著縮短關鍵字（例如只輸入其中的「歌名」或「歌手」），更容易搜到喔！</p>`;
        }

        resultsEl.innerHTML = `
          <div class="empty-state-box">
            <p>🔍 找不到符合「${kw}」的版本嗎？可能該曲目仍在編曲排程中。</p>
            ${hintHtml}
            <a class="empty-contact-btn" href="#" onclick="openLineModal(); return false;">
              💬 點此聯絡 LINE 客服直接許願編曲
            </a>
          </div>
        `;
        return;
      }

      statusEl.textContent = "";
      resultsEl.innerHTML =
        `<div class="result-count">找到 ${list.length} 筆符合「${kw}」的結果：</div>` +
        list.map(s => {
          let badgeHtml = '';
          
          // 權重規則：聽編樂譜專屬資料來源優先覆蓋，防止被歌曲名稱內文鋼琴版字樣誤導
          if (s.sourceType === "listening") {
            badgeHtml = `<span class="version-badge badge-listening">聽編樂譜</span>`;
          } else if (s.title.includes("伴奏")) {
            badgeHtml = `<span class="version-badge badge-accompaniment">鋼琴伴奏版</span>`;
          } else if (s.title.includes("三重奏")) {
            badgeHtml = `<span class="version-badge badge-trio">鋼琴三重奏</span>`;
          } else if (s.title.includes("小提琴")) {
            badgeHtml = `<span class="version-badge badge-violin">小提琴與鋼琴</span>`;
          } else if (s.title.includes("演奏版")) {
            badgeHtml = `<span class="version-badge badge-piano-play">鋼琴演奏版</span>`;
          } else if (s.title.includes("鋼琴版")) {
            badgeHtml = `<span class="version-badge badge-piano-solo">鋼琴版</span>`;
          } else {
            badgeHtml = `<span class="version-badge badge-solo">鋼琴獨奏版</span>`;
          }

          return `
            <div class="card">
              <div class="song-title-wrap">
                ${badgeHtml}
                <div class="song-title">${s.title}</div>
              </div>
              <div class="links">
                ${s.productUrl ? `<a class="link-preview" href="${s.productUrl}" target="_blank">📄 首頁預覽</a>` : ""}
                ${s.youtubeUrl ? `<a class="link-demo" href="${s.youtubeUrl}" target="_blank">🎬 示範演奏</a>` : ""}
              </div>
            </div>
          `;
        }).join("");
    }

    document.getElementById("searchBtn").onclick = () => doSearch(false);
    searchEl.addEventListener("input", handleSearchInput);
    searchEl.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(false); });

    clearBtnEl.onclick = function() {
      searchEl.value = "";
      toggleClearButton();
      resultsEl.innerHTML = "";
      statusEl.textContent = `目前共有 ${songs.length} 首歌曲提供搜尋！`;
      searchEl.focus();
    };

    loadAllCSVs();
  </script>

</body>
</html>
