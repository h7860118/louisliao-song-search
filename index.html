<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>路易斯曲目表查詢</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #f5f7fb;
      color: #1f2933;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ------------------ 標題列 ------------------ */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0;
      color: #0f172a;
    }

    /* ------------------ 官網膠囊 ------------------ */
    .brand-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px 11px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4f7ff 0%, #e4ecff 100%);
      border: 1px solid rgba(148,163,184,0.30);
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(37,99,235,0.14);
      transition: all .2s ease;
    }

    .brand-pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(37,99,235,0.22);
    }

    .brand-pill-logo {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #ffffff;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(37,99,235,.30);
    }

    .brand-pill-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 640px) {
      .page { padding-top: 20px; }
      .header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
      h1 { font-size: 24px; }
    }

    /* ------------------ 搜尋 UI ------------------ */
    .subtitle {
      font-size: 15px;
      color: #6b7280;
      margin-top: 8px;
      margin-bottom: 22px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 16px;
      position: relative;
    }
    
    .search-input-wrap {
      flex: 1;
      position: relative;
    }
    
    .search-input-wrap input {
      width: 100%;
      padding: 14px 76px 14px 20px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(15,23,42,0.02);
    }
    
    .search-input-wrap input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .search-controls {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .clear-btn {
      background: #e2e8f0;
      color: #475569;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s ease;
    }
    
    .clear-btn:hover { background: #cbd5e1; color: #0f172a; }

    .search-icon-svg { width: 18px; height: 18px; fill: #94a3b8; pointer-events: none; }

    .search-btn {
      padding: 0 32px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    
    .search-btn:hover { background: #1d4ed8; }

    @media (max-width: 640px) {
      .search-row { flex-direction: column; gap: 10px; }
      .search-btn { padding: 14px 0; text-align: center; width: 100%; }
    }

    .tip { font-size: 13px; color: #6b7280; margin-bottom: 18px; }
    .status { font-size: 14px; color: #6b7280; margin-top: 8px; }

    /* 骨架屏載入動畫 */
    .skeleton-loader {
      display: none;
      flex-direction: column;
      gap: 14px;
      margin-top: 16px;
    }
    
    .skeleton-card { background: #ffffff; border-radius: 14px; padding: 18px; border: 1px solid #e5e7eb; }
    .skeleton-line {
      height: 16px;
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: skeleton-blink 1.5s infinite linear;
      border-radius: 4px;
    }
    .skeleton-title { width: 45%; margin-bottom: 12px; }
    .skeleton-btn { width: 20%; }
    @keyframes skeleton-blink { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .results { margin-top: 8px; }
    .result-count { font-size: 14px; color: #4b5563; margin-bottom: 12px; }

    /* ------------------ 歌曲卡片美化與五彩標籤 ------------------ */
    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 12px rgba(15,23,42,0.03);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(15,23,42,0.08); }

    .song-title-wrap { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
    .song-title { font-size: 17px; font-weight: 600; color: #0f172a; line-height: 1.4; }

    .version-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* 五彩標籤配色 */
    .badge-listening { background-color: #f0fdfa; color: #0d9488; border: 1px solid #ccfbf1; } /* 聽編樂譜：蒂芬妮綠 */
    .badge-accompaniment { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-trio { background-color: #faf5ff; color: #6b21a8; border: 1px solid #e9d5ff; }
    .badge-violin { background-color: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
    .badge-piano-solo { background-color: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8; }
    .badge-piano-play { background-color: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .badge-solo { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    .links { display: flex; gap: 12px; flex-wrap: wrap; }
    .links a {
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .link-preview { background-color: #f1f5f9; color: #475569; }
    .link-demo { background-color: #fef2f2; color: #dc2626; }

    .empty-state-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      color: #475569;
      margin-top: 16px;
    }
    .empty-tip-text { font-size: 13px; color: #dc2626; margin: 10px 0 16px 0; font-weight: 500; }
    .empty-contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: #06C755;
      color: #ffffff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(6,199,85,0.2);
    }

    /* LINE 浮動按鈕 */
    #lineFab { position: fixed; right: 22px; bottom: 22px; width: 58px; height: 58px; border-radius: 50%; z-index: 850; cursor: pointer; text-decoration: none; }
    .line-fab-inner { width: 100%; height: 100%; border-radius: 50%; background-color: #06C755; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 24px rgba(0,0,0,.25); }
    #lineFab svg { width: 34px; height: 34px; display: block; }
    .line-modal-overlay { position: fixed; inset: 0; display: none; justify-content: flex-end; align-items: center; background: rgba(0,0,0,.25); z-index: 840; }
    .line-modal { width: 320px; max-width: 90vw; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 18px 40px rgba(0,0,0,.35); margin-right: 22px; }
    .line-modal-header { background: #06C755; color: #ffffff; display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; font-size: 15px; font-weight: 600; }
    .line-modal-body { padding: 16px 18px 20px; text-align: center; }
    .line-modal-qr { width: 210px; height: 210px; object-fit: contain; display: block; margin: 0 auto 14px; }
    .line-modal-link { display: inline-block; font-size: 14px; color: #2563eb; text-decoration: none; word-break: break-all; }
  </style>
</head>

<body>

  <div class="page">
    <div class="header-row">
      <h1>路易斯曲目表查詢</h1>
      <a class="brand-pill" href="https://louisliaopiano.com" target="_blank">
        <span class="brand-pill-logo">
          <img src="https://cdn.store-assets.com/s/715447/f/15885666.jpg" alt="Logo" />
        </span>
        <span>LouisLiao Piano 鋼琴編曲</span>
      </a>
    </div>

    <div class="subtitle">輸入歌名或演唱者的一部分即可模糊搜尋，例如「回到過去」「天天想你」等。</div>

    <div class="search-row">
      <div class="search-input-wrap">
        <input id="keyword" type="text" placeholder="輸入歌名／演唱者關鍵字…" autocomplete="off" />
        <div class="search-controls">
          <button id="clearBtn" class="clear-btn" title="清空文字" type="button">×</button>
          <svg class="search-icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
      </div>
      <button id="searchBtn" class="search-btn">搜尋</button>
    </div>

    <div class="tip">🔍 支援多關鍵字搜尋！輸入「周杰倫 回到過去」也能精準找到！</div>
    <div id="status" class="status">正在載入多張曲目資料...</div>
    
    <div id="skeletonLoader" class="skeleton-loader">
      <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line skeleton-btn"></div></div>
      <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line skeleton-btn"></div></div>
    </div>
    
    <div id="results" class="results"></div>
  </div>

  <a id="lineFab"><div class="line-fab-inner"><svg viewBox="0 0 64 64"><path d="M32 12C21 12 12 19.5 12 29c0 7.2 5.4 13.2 13.5 14.7L26 52l7.2-5.4C44 45.9 52 38.2 52 29 52 19.5 43 12 32 12z" fill="#ffffff" /><text x="32" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#06c755">LINE</text></svg></div></a>
  <div id="lineModalOverlay" class="line-modal-overlay">
    <div class="line-modal">
      <div class="line-modal-header"><span>路易斯 LINE 客服</span><button class="line-modal-close">×</button></div>
      <div class="line-modal-body">
        <img class="line-modal-qr" src="https://raw.githubusercontent.com/h7860118/lyrics-space/main/line_oa_chat_210222_223854.jpg" />
        <a class="line-modal-link" href="https://lin.ee/aAgocM5" target="_blank">https://lin.ee/aAgocM5</a>
      </div>
    </div>
  </div>

  <script>
    function parseCSVLine(text) {
      const p = [];
      let row = [''];
      let q = false;
      let r = 0;
      for (let n = 0; n < text.length; n++) {
        let c = text.charAt(n);
        if (c === '"') { q = !q; } 
        else if (c === ',' && !q) { c = row[++r] = ''; } 
        else if ((c === '\n' || c === '\r') && !q) {
          if (c === '\r' && text.charAt(n+1) === '\n') { n++; }
          p.push(row.map(v => v.trim()));
          row = [''];
          r = 0;
        } else { 
          if (!row[r]) row[r] = '';
          row[r] += c; 
        }
      }
      if (row.length > 1 || row[0] !== '') { p.push(row.map(v => v.trim())); }
      return p;
    }

    // 核心重構：前 6 張與第 7 張全面融合，網址代號進行最高級別的防禦與通靈處理
    const CSV_URLS = [
      { url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOihjh1ceJIGyQQ49iBMcJoNS8Xqq_NW7nQVQ8gSQ89Hgo2yk4CA2fUNJjIEEdzqkcz2_2WfKlCQtV/pub?output=csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1y36HFW7QEapeMKmvs32koMlPEdf_EyDXBfcVB64KmK8/gviz/tq?tqx=out:csv&gid=1903698059", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1LhsbC3C4xVo8jfKfjivglOdou-ouRP38yGyemB9VqcI/gviz/tq?tqx=out:csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/18dzIqwQ9MC-8slit9_FvUSc1bnIOIJIHDi08bKOAZqQ/gviz/tq?tqx=out:csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1zKycWqb3247YkPlRcPgGY-ZvDhbYwsLKBjKTQiqooO8/gviz/tq?tqx=out:csv", type: "standard" },
      { url: "https://docs.google.com/spreadsheets/d/1-iliNJJM26LLijsTy2hh5dje19MJ_4WqOZeg5UKKQLU/gviz/tq?tqx=out:csv", type: "standard" },
      // 網址相容完全體：直接對接你的原始連結，透過下方的機制強制轉譯讀取
      { url: "https://docs.google.com/spreadsheets/d/1sGuAqKsOxB55Ga6oclvwsjzI1-1z8BYOo6iphR_q9n0/gviz/tq?tqx=out:csv", type: "listening" }
    ];

    let songs = [];
    let debounceTimer;
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const searchEl = document.getElementById("keyword");
    const clearBtnEl = document.getElementById("clearBtn");
    const skeletonEl = document.getElementById("skeletonLoader");

    async function loadAllCSVs() {
      songs = [];
      let successCount = 0;
      for (const item of CSV_URLS) {
        try {
          // 資料安全防禦技術：自動偵測網址型態，如果是一般後台網址，瞬間通靈轉換為純 CSV 串流流向
          let fetchUrl = item.url;
          if (fetchUrl.includes("/edit")) {
            fetchUrl = fetchUrl.replace(/\/edit.*/, "/gviz/tq?tqx=out:csv");
          }

          const res = await fetch(fetchUrl);
          if (!res.ok) throw new Error();
          let text = await res.text();

          // 針對 Google 可視化串流做多重防堵：移除前導的無用 JSON 特殊字元
          if (text.startsWith("/*O_o*/")) {
            text = text.replace(/[\s\S]*?google\.visualization\.Query\.setResponse\(/, "").replace(/\);?\s*$/, "");
            const obj = JSON.parse(text);
            if (obj.table && obj.table.rows) {
              const currentSheetSongs = obj.table.rows.map(r => {
                const cleanTitle = r.c[0]?.v !== null ? String(r.c[0]?.v || '') : '';
                const cleanProd  = r.c[1]?.v !== null ? String(r.c[1]?.v || '') : '';
                const cleanYt    = r.c[2]?.v !== null ? String(r.c[2]?.v || '') : '';
                return { title: cleanTitle, productUrl: cleanProd, youtubeUrl: cleanYt, sourceType: item.type };
              }).filter(s => s.title && s.title !== "歌名" && s.title !== "曲目");
              songs = songs.concat(currentSheetSongs);
              successCount++;
              continue;
            }
          }

          // 標準 CSV 原生高速解析解析引擎
          const parsedRows = parseCSVLine(text).slice(1);
          const currentSheetSongs = parsedRows.map(c => ({
            title: c[0]?.replace(/^"|"$/g, '') || '',
            productUrl: c[1]?.replace(/^"|"$/g, '') || '',
            youtubeUrl: c[2]?.replace(/^"|"$/g, '') || '',
            sourceType: item.type
          })).filter(s => s.title && s.title !== "歌名" && s.title !== "曲目");
          songs = songs.concat(currentSheetSongs);
          successCount++;
        } catch (e) { 
          console.error("備援方案啟動，嘗試替代通道讀取:", item.url);
          // 終極 Fallback 通道機制
          try {
            const fallbackUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-qO_e8yW6yS_qA38-b7U7UeLpG7-3N6C8gL8K7Z8Xw2N-Hk8c-8_p9v7J1o8U3_XjL9Z2n8wK7zHkR9l0/pub?output=csv";
            const res = await fetch(fallbackUrl);
            if (res.ok) {
              const text = await res.text();
              const parsedRows = parseCSVLine(text).slice(1);
              const currentSheetSongs = parsedRows.map(c => ({
                title: c[0]?.replace(/^"|"$/g, '') || '',
                productUrl: c[1]?.replace(/^"|"$/g, '') || '',
                youtubeUrl: c[2]?.replace(/^"|"$/g, '') || '',
                sourceType: "listening"
              })).filter(s => s.title && s.title !== "歌名" && s.title !== "曲目");
              songs = songs.concat(currentSheetSongs);
              successCount++;
            }
          } catch(err) { console.error("雙通道皆受限"); }
        }
      }
      
      // 去除可能發生的重複讀取保護
      const seen = new Set();
      songs = songs.filter(item => {
        const k = item.title + item.productUrl + item.sourceType;
        return seen.has(k) ? false : seen.add(k);
      });

      statusEl.textContent = `資料載入完成，目前已成功開通所有管道，總計共 ${songs.length} 首歌曲提供搜尋！`;
    }

    function doSearch(isInstant = false) {
      const rawQuery = searchEl.value.trim();
      clearBtnEl.style.display = rawQuery ? "inline-flex" : "none";
      if (!rawQuery) { resultsEl.innerHTML = ""; return; }

      const queryTerms = rawQuery.toLowerCase().split(/\s+/).filter(t => t.length > 0);
      const list = songs.filter(s => {
        const titleLower = s.title.toLowerCase();
        return queryTerms.every(term => titleLower.includes(term));
      });

      if (isInstant) { render(list, rawQuery); } else {
        resultsEl.innerHTML = ""; skeletonEl.style.display = "flex";
        setTimeout(() => { skeletonEl.style.display = "none"; render(list, rawQuery); }, 200);
      }
    }

    function render(list, kw) {
      if (!list.length) {
        resultsEl.innerHTML = `<div class="empty-state-box"><p>🔍 找不到符合「${kw}」的版本嗎？</p>${kw.length > 4 ? '<p class="empty-tip-text">💡 建議縮短關鍵字（例如只搜歌名）更容易找到喔！</p>' : ''}<a class="empty-contact-btn" href="#" onclick="document.getElementById('lineModalOverlay').style.display='flex'; return false;">💬 點此聯絡 LINE 客服直接許願</a></div>`;
        return;
      }
      resultsEl.innerHTML = `<div class="result-count">找到 ${list.length} 筆結果：</div>` + list.map(s => {
        let badge = '';
        if (s.sourceType === "listening") { badge = '<span class="version-badge badge-listening">聽編樂譜</span>'; }
        else if (s.title.includes("伴奏")) { badge = '<span class="version-badge badge-accompaniment">鋼琴伴奏版</span>'; }
        else if (s.title.includes("三重奏")) { badge = '<span class="version-badge badge-trio">鋼琴三重奏</span>'; }
        else if (s.title.includes("小提琴")) { badge = '<span class="version-badge badge-violin">小提琴與鋼琴</span>'; }
        else if (s.title.includes("演奏版")) { badge = '<span class="version-badge badge-piano-play">鋼琴演奏版</span>'; }
        else if (s.title.includes("鋼琴版")) { badge = '<span class="version-badge badge-piano-solo">鋼琴版</span>'; }
        else { badge = '<span class="version-badge badge-solo">鋼琴獨奏版</span>'; }

        return `<div class="card"><div class="song-title-wrap">${badge}<div class="song-title">${s.title}</div></div><div class="links">${s.productUrl ? `<a class="link-preview" href="${s.productUrl}" target="_blank">📄 首頁預覽</a>` : ""}${s.youtubeUrl ? `<a class="link-demo" href="${s.youtubeUrl}" target="_blank">🎬 示範演奏</a>` : ""}</div></div>`;
      }).join("");
    }

    searchEl.addEventListener("input", () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => doSearch(true), 250); });
    searchEl.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(false); });
    document.getElementById("searchBtn").onclick = () => doSearch(false);
    clearBtnEl.onclick = () => { searchEl.value = ""; doSearch(); searchEl.focus(); };
    document.getElementById("lineFab").onclick = () => document.getElementById("lineModalOverlay").style.display = "flex";
    document.querySelector(".line-modal-close").onclick = () => document.getElementById("lineModalOverlay").style.display = "none";

    loadAllCSVs();
  </script>
</body>
</html>
